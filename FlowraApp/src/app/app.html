<button
  (click)="toggleTheme()"
  class="fixed bottom-6 right-6 w-14 h-14 rounded-full shadow-lg flex items-center justify-center z-50 transition-all duration-300 hover:scale-110 focus:outline-none focus:ring-4 focus:ring-indigo-500/30"
  [ngClass]="(isDarkMode$ | async) ? 'bg-slate-800 text-yellow-400 border border-slate-700' : 'bg-white text-slate-700 border border-slate-200'">

  <i [class]="(isDarkMode$ | async) ? 'fas fa-sun text-xl' : 'fas fa-moon text-xl'"></i>
</button>
