<app-auth-layout-component
  title="Güvenli Bağlantı"
  subtitle="Hesabınızı korumak için gerekli güvenlik doğrulamaları gerçekleştiriliyor."
  formTitle="E-posta Onayı"
  maxWidth="md">

  <div class="py-2 flex flex-col items-center justify-center min-h-[250px]">

    <div *ngIf="currentState === 'loading'" class="flex flex-col items-center animate-pulse">
      <div class="w-14 h-14 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
      <h3 class="text-xl font-semibold text-slate-900 dark:text-white mb-1">Doğrulanıyor</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400">Lütfen bekleyin...</p>
    </div>

    <div *ngIf="currentState === 'success'" class="flex flex-col items-center animate-in fade-in zoom-in duration-300">
      <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center mb-4 border border-emerald-200 dark:border-emerald-800/50">
        <i class="fas fa-check text-2xl"></i>
      </div>
      <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Doğrulama Başarılı</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-6">
        Bu pencere otomatik olarak kapatılacak.<br>Ana sekmenizden giriş yapabilirsiniz.
      </p>

      <app-custom-button-component variant="secondary" (click)="closeTab()">
        Pencereyi Kapat
      </app-custom-button-component>
    </div>

    <div *ngIf="currentState === 'error'" class="flex flex-col items-center animate-in fade-in duration-300">
      <div class="w-16 h-16 bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-full flex items-center justify-center mb-4">
        <i class="fas fa-times text-2xl"></i>
      </div>
      <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Doğrulama Başarısız</h3>
      <p class="text-sm text-red-500 dark:text-red-400 text-center mb-6 px-4">{{ errorMessage }}</p>

      <p class="text-sm text-slate-500">Güvenlik gereği bu sekmeyi kapatabilirsiniz.</p>
    </div>

  </div>
</app-auth-layout-component>
