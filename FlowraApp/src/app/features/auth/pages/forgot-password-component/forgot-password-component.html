<app-auth-layout-component
  title="Şifrenizi mi Unuttunuz?"
  subtitle="Hesabınıza kayıtlı e-posta adresinizi girin. Size güvenli bir şifre sıfırlama bağlantısı göndereceğiz."
  formTitle="Şifre Sıfırlama"
  maxWidth="md">

  <div auth-illustration class="w-20 h-20 bg-indigo-500/10 rounded-2xl flex items-center justify-center border border-indigo-500/20 mb-6 shadow-inner">
    <svg class="w-10 h-10 text-indigo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
    </svg>
  </div>

  <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-6 mt-2">
    <app-base-input-component
      label="E-Posta Adresiniz"
      placeholder="ornek@sirket.com"
      type="email"
      icon="fas fa-envelope"
      [control]="emailControl">
    </app-base-input-component>

    <div class="pt-2">
      <app-custom-button-component
        type="submit"
        variant="primary"
        [isLoading]="authService.isLoading()"
        [disabled]="forgotPasswordForm.invalid">
        Sıfırlama Bağlantısı Gönder
      </app-custom-button-component>
    </div>

    <div class="text-center mt-6">
      <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">
        Şifrenizi hatırladınız mı?
        <a routerLink="/auth/login" class="text-indigo-600 dark:text-indigo-400 font-bold hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors focus:outline-none focus:underline">
          Giriş yapın
        </a>
      </p>
    </div>
  </form>

</app-auth-layout-component>
