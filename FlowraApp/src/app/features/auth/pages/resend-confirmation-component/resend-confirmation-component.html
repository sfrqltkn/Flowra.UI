<app-auth-layout-component
  title="Hesabınızı Doğrulayın"
  subtitle="E-posta adresinizi girin, size yeni bir hesap doğrulama bağlantısı gönderelim."
  formTitle="Yeni Bağlantı İste"
  maxWidth="md">

  <div auth-illustration class="w-20 h-20 bg-amber-500/10 rounded-2xl flex items-center justify-center border border-amber-500/20 mb-6 shadow-inner">
    <i class="fas fa-paper-plane text-3xl text-amber-500"></i>
  </div>

  <form [formGroup]="resendForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-6 mt-2">

    <app-base-input-component
      label="E-Posta Adresiniz"
      placeholder="ornek@sirket.com"
      type="email"
      icon="fas fa-envelope"
      [control]="emailControl">
    </app-base-input-component>

    <div class="pt-2">
      <app-custom-button-component
        type="submit"
        variant="primary"
        [isLoading]="authService.isLoading()"
        [disabled]="resendForm.invalid">
        Doğrulama Bağlantısı Gönder
      </app-custom-button-component>
    </div>

    <div class="text-center mt-6">
      <p class="text-sm text-slate-500 dark:text-slate-400 font-medium">
        Hesabınızı zaten doğruladınız mı?
        <a routerLink="/auth/login" class="text-indigo-600 dark:text-indigo-400 font-bold hover:text-indigo-700 dark:hover:text-indigo-300 transition-colors focus:outline-none focus:underline">
          Giriş yapın
        </a>
      </p>
    </div>

  </form>

</app-auth-layout-component>
