<app-auth-layout-component
  title="Yeni Şifre Belirleme"
  subtitle="Hesabınıza yeniden erişmek için lütfen yeni ve güvenli bir şifre oluşturun."
  formTitle="Şifrenizi Güncelleyin"
  maxWidth="md">

  <div *ngIf="isInvalidLink" class="flex flex-col items-center justify-center text-center py-4 animate-fade-in">
    <div class="w-16 h-16 bg-red-100 dark:bg-red-500/20 rounded-full flex items-center justify-center mb-5 ring-4 ring-red-50 dark:ring-red-900/30">
      <i class="fas fa-times text-2xl text-red-600 dark:text-red-400"></i>
    </div>
    <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-3">Geçersiz Bağlantı</h3>
    <p class="text-sm text-slate-500 dark:text-slate-400 mb-8 leading-relaxed">
      Şifre sıfırlama bağlantınız eksik veya geçersiz. Lütfen yeni bir sıfırlama talebinde bulunun.
    </p>
    <app-custom-button-component type="button" variant="primary" routerLink="/auth/forgot-password">
      Yeni Bağlantı İste
    </app-custom-button-component>
  </div>

  <form *ngIf="!isInvalidLink && !isSubmitted" [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="flex flex-col space-y-4 mt-2">
    <app-base-input-component
      label="Yeni Şifre"
      placeholder="••••••••"
      type="password"
      icon="fas fa-lock"
      [control]="newPasswordControl">
    </app-base-input-component>

    <app-base-input-component
      label="Yeni Şifre (Tekrar)"
      placeholder="••••••••"
      type="password"
      icon="fas fa-check-circle"
      [control]="confirmNewPasswordControl">
    </app-base-input-component>

    <div class="pt-4">
      <app-custom-button-component
        type="submit"
        variant="primary"
        [isLoading]="authService.isLoading()"
        [disabled]="resetForm.invalid">
        Şifreyi Güncelle
      </app-custom-button-component>
    </div>
  </form>

  <div *ngIf="isSubmitted" class="flex flex-col items-center py-4 animate-in fade-in zoom-in duration-300">
    <div class="w-16 h-16 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 rounded-full flex items-center justify-center mb-4 border border-emerald-200 dark:border-emerald-800/50">
      <i class="fas fa-check text-2xl"></i>
    </div>
    <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">Şifreniz Değiştirildi</h3>
    <p class="text-sm text-slate-500 dark:text-slate-400 text-center mb-6">
      Bu pencere otomatik olarak kapatılacak.<br>Ana sekmenizden giriş yapabilirsiniz.
    </p>
    <app-custom-button-component variant="secondary" (click)="closeTab()">
      Pencereyi Kapat
    </app-custom-button-component>
  </div>

</app-auth-layout-component>
