<div class="min-h-screen flex w-full relative overflow-hidden bg-slate-100 dark:bg-slate-950 transition-colors duration-500">

  <div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
    <div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-indigo-500/10 dark:bg-indigo-500/20 blur-[120px] animate-pulse"></div>
    <div class="absolute top-[60%] -right-[5%] w-[30%] h-[30%] rounded-full bg-violet-500/10 dark:bg-violet-500/20 blur-[100px] animate-pulse" style="animation-delay: 2s;"></div>
  </div>

  <div class="hidden lg:flex w-1/2 relative z-10 flex-col justify-between p-16 bg-slate-900 dark:bg-black transition-colors duration-500 border-r border-slate-800/50">

    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-violet-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
        <span class="text-white font-bold text-xl uppercase">F</span>
      </div>
      <span class="text-2xl font-bold tracking-tight text-white">Flowra</span>
    </div>

    <div class="flex flex-col max-w-lg">
      <div class="w-full mb-12">
        <ng-content select="[auth-illustration]"></ng-content>
      </div>
      <h1 class="text-4xl xl:text-5xl font-extrabold text-white tracking-tight mb-6 leading-tight">
        {{ title }}
      </h1>
      <p class="text-lg text-slate-400 leading-relaxed">
        {{ subtitle }}
      </p>
    </div>

    <div class="text-sm text-slate-500 font-medium">
      &copy; 2026 Flowra. Tüm hakları saklıdır.
    </div>
  </div>

  <div class="w-full lg:w-1/2 flex items-center justify-center relative z-10 p-6 bg-slate-100 dark:bg-slate-950 transition-colors duration-500">

    <div class="absolute top-10 left-10 lg:hidden flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-md">
        <span class="text-white font-bold text-sm">F</span>
      </div>
      <span class="text-xl font-bold text-slate-900 dark:text-white">Flowra</span>
    </div>

   <div class="w-full bg-white/40 dark:bg-slate-900/40 backdrop-blur-md border border-slate-200 dark:border-slate-800/50 rounded-3xl p-10 shadow-xl transition-all duration-500"
         [ngClass]="{
           'max-w-md': maxWidth === 'md',
           'max-w-lg': maxWidth === 'lg',
           'max-w-xl': maxWidth === 'xl'
         }">

     <div class="mb-8">
        <h2 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">{{ formTitle }}</h2>
      </div>

      <ng-content></ng-content>

    </div>
  </div>

</div>
